repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-added-large-files # prevents giant files from being committed.
      - id: check-case-conflict # checks for files that would conflict in case-insensitive filesystems.
      - id: check-merge-conflict # checks for files that contain merge conflict strings.
      - id: detect-private-key # detects the presence of private keys.
      - id: end-of-file-fixer # ensures that a file is either empty, or ends with one newline.
        # Golden files for empty-result CLI tests are a single "\n" because
        # test_utils.go's SortForComparison force-appends "\n" to actual output.
        exclude: |
          (?x)^(
            testdata/changes/empty_config\.golden|
            testdata/trades/ledger_no_trades\.golden|
            testdata/operations/ledger_no_ops\.golden|
            testdata/transactions/ledger_no_txs\.golden|
            testdata/effects/ledger_no_effects\.golden|
            testdata/assets/ledger_no_assets\.golden
          )$
      - id: fix-byte-order-marker # removes utf-8 byte order marker.
      - id: mixed-line-ending # replaces or checks mixed line ending.
      - id: trailing-whitespace # trims trailing whitespace.
        exclude: |
          (?x)^(
            testdata/changes/empty_config\.golden|
            testdata/trades/ledger_no_trades\.golden|
            testdata/operations/ledger_no_ops\.golden|
            testdata/transactions/ledger_no_txs\.golden|
            testdata/effects/ledger_no_effects\.golden|
            testdata/assets/ledger_no_assets\.golden
          )$

  - repo: https://github.com/golangci/golangci-lint
    rev: v2.4.0
    hooks:
      - id: golangci-lint
        entry: golangci-lint run --fix

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v3.1.0
    hooks:
      - id: prettier
        files: \.(json|markdown|md|yaml|yml)$
        language_version: 14.21.3
